        var openNav = function() {
            var openNavEl = document.getElementById("mySidenav");
            openNavEl.style.width = "250px";
        }

        var closeNav = function () {
            var closeNavEl = document.getElementById('mySidenav');
            closeNavEl.style.width = "0";
        }
/* To Pause the old audio when another one is played */

        document.addEventListener("play", function(e) {
            var audios = document.getElementsByTagName("audio");
            for ( var i = 0; i < audios.length; i ++ ){
                if(audios[i] != e.target) {
                    audios[i].pause();
                }
            }
        }, true);
/* To play all audio automatically*/

        //Grab all audio elenents
        var audio = document.getElementsByTagName('audio');
        //Create listeners
        for (var i = 0; i < audio.length; i++) {
            audioListeners(i);
        }
        function audioListeners(i) {
            audio[i].addEventListener('ended', function() {
              this.duration = 0;
              this.pause();
              audio[i+1].play();
            }, false);
        }
    </script>
